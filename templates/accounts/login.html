{% extends "base/base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">⚕</div>
      <h1>Welcome Back</h1>
      <p>Sign in to MediBook HMS</p>
    </div>
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }}" style="margin-bottom:16px;">{{ message }}</div>
      {% endfor %}
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" required placeholder="your@email.com" autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="Enter your password">
      </div>
      <button type="submit" class="btn-auth">Sign In →</button>
    </form>
    <div class="auth-footer">
      Don't have an account? <a href="{% url 'accounts:signup_choose' %}">Create one</a>
    </div>
  </div>
</div>
{% endblock %}
