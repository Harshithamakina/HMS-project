{% extends "base/base.html" %}
{% block title %}Sign Up{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">⚕</div>
      <h1>Create Account</h1>
      <p>Choose your account type to get started</p>
    </div>
    <div class="role-choose">
      <a href="{% url 'accounts:doctor_signup' %}" class="role-card">
        <span class="icon">👨‍⚕️</span>
        <h3>Doctor</h3>
        <p>Manage your availability & appointments</p>
      </a>
      <a href="{% url 'accounts:patient_signup' %}" class="role-card">
        <span class="icon">🏥</span>
        <h3>Patient</h3>
        <p>Book appointments with doctors</p>
      </a>
    </div>
    <div class="auth-footer" style="margin-top:20px;">Already have an account? <a href="{% url 'accounts:login' %}">Sign in</a></div>
  </div>
</div>
{% endblock %}
